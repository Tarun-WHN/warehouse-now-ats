services:
  - type: web
    name: warehouse-now-ats
    runtime: node
    plan: starter
    buildCommand: npm install && npx next build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    startCommand: node .next/standalone/server.js
    healthCheckPath: /login
    disk:
      name: ats-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0
      # Persistent storage (survives deploys & restarts)
      - key: DATA_DIR
        value: /var/data
      - key: UPLOAD_DIR
        value: /var/data/uploads
      # Auto-generated, stable across deploys. Used to sign session cookies.
      - key: SESSION_SECRET
        generateValue: true
      # First-boot admin account. Change the password after first login.
      - key: ADMIN_EMAIL
        value: admin@warehousenow.in
      - key: ADMIN_PASSWORD
        sync: false
      # Optional: enables AI resume parsing. Set in the Render dashboard.
      - key: ANTHROPIC_API_KEY
        sync: false
