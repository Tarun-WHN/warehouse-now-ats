services:
  - type: web
    name: warehouse-now-ats
    runtime: node
    plan: free
    buildCommand: npm install && npx next build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0
